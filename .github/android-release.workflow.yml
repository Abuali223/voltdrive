name: Build Android Release (AAB)

# Builds a signed .aab (for Play Store) and a signed .apk (for direct install/testing).
# Trigger manually (Actions tab → Run workflow) or by pushing a tag like android-v1.0.0.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of android/voltdrive-upload.keystore
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_PASSWORD       key password (same as store password)

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/voltdrive-upload.keystore

      - name: Build release bundle + APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: voltdrive-upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: voltdrive
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voltdrive-android
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Remove keystore from runner
        if: always()
        run: rm -f android/voltdrive-upload.keystore
