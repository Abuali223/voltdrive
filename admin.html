<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoltDrive — Admin</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{background:radial-gradient(130% 90% at 50% -10%,#1d1e23 0%,#0c0d10 60%);color:#f3f4f6;min-height:100vh;padding:18px 14px 48px;}
  .wrap{max-width:760px;margin:0 auto;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .logo{display:flex;align-items:center;gap:11px;min-width:0;}
  .bolt{width:42px;height:42px;border-radius:13px;background:linear-gradient(150deg,#FF8A2B,#FF4D00);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px -6px rgba(255,90,0,.7);flex:0 0 auto;}
  .logo b{font-family:'Sora';font-weight:800;font-size:18px;line-height:1.15;display:block;}
  .logo span{color:#8a8c92;font-size:12px;}
  #who{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
  button{cursor:pointer;font-family:inherit;}
  .btn{background:linear-gradient(150deg,#FF8A2B,#FF4D00);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:700;font-size:14px;box-shadow:0 8px 20px -8px rgba(255,90,0,.6);transition:transform .12s;}
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;box-shadow:none;}
  .btn.sm{padding:8px 13px;font-size:12.5px;border-radius:10px;}
  .btn.red{background:rgba(255,80,80,.14);border:1px solid rgba(255,80,80,.35);color:#ff8a8a;box-shadow:none;}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 16px 44px -26px rgba(0,0,0,.85);}
  .me{color:#8a8c92;font-size:13px;overflow-wrap:anywhere;}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .tab{flex:0 0 auto;white-space:nowrap;padding:9px 14px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:13px;font-weight:600;color:#bcbdc4;transition:background .15s;}
  #refresh{margin-left:auto;}
  .tab.on{background:linear-gradient(150deg,#FF8A2B,#FF4D00);color:#fff;border-color:transparent;}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .row > div:first-child{flex:1 1 auto;min-width:0;}
  .badge{font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:7px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
  .b-pending{background:rgba(255,170,40,.16);color:#FFB454;}
  .b-active{background:rgba(67,214,132,.16);color:#43d684;}
  .b-trial{background:rgba(120,120,255,.18);color:#a3a3ff;}
  .b-none,.b-expired{background:rgba(255,255,255,.08);color:#9a9ca4;}
  .email{font-family:'Sora';font-weight:700;font-size:15px;overflow-wrap:anywhere;line-height:1.25;}
  .muted{color:#8a8c92;font-size:12.5px;margin-top:4px;line-height:1.5;overflow-wrap:anywhere;}
  .acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto;}
  h2{font-family:'Sora';font-size:16px;margin-bottom:8px;}
  .empty{color:#6a6c72;text-align:center;padding:40px 10px;font-size:14px;}
  select,input{font-family:inherit;background:#15161b;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:10px;outline:none;}
  select{padding:8px 10px;font-size:12.5px;}
  input{padding:12px 14px;font-size:14px;width:100%;}
  input:focus,select:focus{border-color:rgba(255,138,43,.6);}
  @media(max-width:560px){
    .top{margin-bottom:16px;}
    #who{width:100%;justify-content:space-between;}
    .acts{margin-left:0;width:100%;}
    .row > div:first-child{flex-basis:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"><div class="bolt"><svg viewBox="0 0 24 24" fill="#fff" style="width:22px;height:22px"><path d="M13 2 4.5 13.5H11l-1 8.5L18.5 10H12l1-8z"/></svg></div><div><b>VoltDrive</b><span>Admin panel</span></div></div>
    <div id="who"></div>
  </div>

  <div id="signin" class="card" style="text-align:center;display:none;">
    <p style="margin-bottom:14px;color:#c8cace;">Obunalarni boshqarish uchun admin sifatida kiring.</p>
    <button class="btn" id="gbtn">Google bilan kirish</button>
    <div id="err" style="color:#ff8a8a;font-size:13px;margin-top:12px;"></div>
  </div>

  <div id="panel" style="display:none;">
    <div class="tabs">
      <div class="tab on" data-f="pending">Kutilayotgan</div>
      <div class="tab" data-f="active">Faol</div>
      <div class="tab" data-f="all">Hammasi</div>
      <div class="tab" data-f="users">👥 Foydalanuvchilar</div>
      <div class="tab" data-f="stats">📊 Statistika</div>
      <div class="tab" id="tab-branding" data-f="branding" style="display:none;">🎨 Branding</div>
      <button class="btn ghost sm" id="refresh" style="margin-left:auto;">↻ Yangilash</button>
    </div>
    <div id="list"></div>

    <!-- Super admin only: manage who can access this panel -->
    <div id="super" class="card" style="display:none;margin-top:22px;">
      <h2>👑 Super admin · Adminlar</h2>
      <p class="muted" style="margin-bottom:14px;">Bu panelga kira oladigan adminlarni boshqaring. Super admin (egasi) o'chirib bo'lmaydi.</p>
      <div class="row" style="margin-bottom:16px;">
        <input id="new-admin" type="email" placeholder="yangi-admin@gmail.com" style="flex:1 1 200px;min-width:0;width:auto;">
        <button class="btn" id="add-admin">+ Qo'shish</button>
      </div>
      <div id="admin-list"></div>
    </div>
  </div>
</div>

<script src="voltdrive.config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

const CFG = window.VOLTDRIVE_CONFIG;
const app = initializeApp(CFG.firebase);
const auth = getAuth(app);
let filter = "pending", subs = [];

const $ = (id) => document.getElementById(id);
$("gbtn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => $("err").textContent = e.message);
$("refresh").onclick = load;
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("on"));
  t.classList.add("on"); filter = t.dataset.f;
  const hideSuper = (filter === "users" || filter === "stats" || filter === "branding");
  $("super").style.display = (!hideSuper && $("super").dataset.allowed === "1") ? "block" : "none";
  if (filter === "users") loadUsers();
  else if (filter === "stats") loadStats();
  else if (filter === "branding") loadBranding();
  else render();
});

onAuthStateChanged(auth, (u) => {
  if (u) {
    $("signin").style.display = "none"; $("panel").style.display = "block";
    $("who").innerHTML = `<span class="me">${u.email}</span> <button class="btn ghost sm" id="out">Chiqish</button>`;
    $("out").onclick = () => signOut(auth);
    load();
    loadAdmins();
  } else {
    $("signin").style.display = "block"; $("panel").style.display = "none"; $("who").innerHTML = "";
  }
});

async function api(path, opts = {}) {
  const token = await auth.currentUser.getIdToken();
  return fetch(`${CFG.apiBase}${path}`, { ...opts, headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}`, ...(opts.headers || {}) } });
}

async function load() {
  $("list").innerHTML = `<div class="empty">Yuklanmoqda…</div>`;
  try {
    const r = await api("/v1/admin/subscriptions");
    if (r.status === 403) { $("list").innerHTML = `<div class="empty">Siz admin emassiz (${auth.currentUser.email}).</div>`; return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    subs = (await r.json()).subscriptions || [];
    render();
  } catch (e) { $("list").innerHTML = `<div class="empty">Xato: ${e.message}</div>`; }
}

function fmtDate(ts) { return ts ? new Date(ts * 1000).toLocaleDateString("uz") : "—"; }

function render() {
  let rows = subs.slice().sort((a, b) => (b.requestedAt || 0) - (a.requestedAt || 0));
  if (filter === "pending") rows = rows.filter(s => s.requestedTier || s.status === "pending");
  else if (filter === "active") rows = rows.filter(s => s.status === "active" || s.status === "trial");
  if (!rows.length) { $("list").innerHTML = `<div class="empty">Hech narsa yo'q.</div>`; return; }
  $("list").innerHTML = rows.map(s => {
    const st = s.status || "none";
    const req = s.requestedTier ? `<span style="color:#FFB454;">⏳ So'rov: ${tierName(s.requestedTier)}</span>` : "";
    return `<div class="card"><div class="row">
      <div>
        <div class="email">${s.email || s.uid}</div>
        <div class="muted">Holat: <span class="badge b-${st}">${st}</span> ${s.tier ? "· " + tierName(s.tier) : ""} ${s.expiresAt ? "· tugaydi " + fmtDate(s.expiresAt) : ""}</div>
        ${req ? `<div class="muted">${req}</div>` : ""}
      </div>
      <div class="acts">
        <select id="t-${s.uid}">${tierOptions(s.requestedTier || '1m')}</select>
        <button class="btn sm" data-act="${s.uid}">Faollashtirish</button>
        <button class="btn red sm" data-rev="${s.uid}">Bekor</button>
      </div>
    </div></div>`;
  }).join("");
  $("list").querySelectorAll("[data-act]").forEach(b => b.onclick = () => activate(b.dataset.act));
  $("list").querySelectorAll("[data-rev]").forEach(b => b.onclick = () => revoke(b.dataset.rev));
}

const TIERS = ["1m","2m","3m","4m","5m","6m","7m","8m","9m","10m","11m","1y"];
function tierName(t) {
  if (t === "1y") return "1 yil";
  const m = /^(\d+)m$/.exec(t || "");
  return m ? m[1] + " oy" : t;
}
function tierOptions(cur) {
  return TIERS.map(t => `<option value="${t}"${t === cur ? " selected" : ""}>${tierName(t)}</option>`).join("");
}

// --- Super admin: manage admins ---
let superEmail = "";
async function loadAdmins() {
  try {
    const r = await api("/v1/admin/admins");
    if (r.status === 403) { $("super").style.display = "none"; return; } // not super admin
    if (!r.ok) return;
    const d = await r.json();
    superEmail = (d.super || "").toLowerCase();
    $("super").dataset.allowed = "1";
    $("tab-branding").style.display = ""; // super admin → show Branding tab
    if (filter !== "users" && filter !== "stats" && filter !== "branding") $("super").style.display = "block";
    renderAdmins(d.admins || []);
  } catch (e) {}
}

// --- Users directory ---
async function loadUsers() {
  $("list").innerHTML = `<div class="empty">Yuklanmoqda…</div>`;
  try {
    const r = await api("/v1/admin/users");
    if (r.status === 403) { $("list").innerHTML = `<div class="empty">Ruxsat yo'q.</div>`; return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    renderUsers(d.users || []);
  } catch (e) { $("list").innerHTML = `<div class="empty">Xato: ${e.message}</div>`; }
}
function renderUsers(list) {
  const subMap = {}; subs.forEach(s => subMap[s.uid] = s);
  list.sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));
  if (!list.length) { $("list").innerHTML = `<div class="empty">Hozircha foydalanuvchi yo'q.</div>`; return; }
  $("list").innerHTML = `<div class="muted" style="margin-bottom:10px;">Jami: ${list.length} foydalanuvchi</div>` + list.map(u => {
    const sb = subMap[u.uid];
    const st = sb ? sb.status : "none";
    const plan = (st === "active" || st === "trial") ? `<span class="badge b-${st}">${st}</span>` : `<span class="badge b-none">free</span>`;
    return `<div class="card"><div class="row">
      <div>
        <div class="email">${u.email || u.uid}</div>
        <div class="muted">Oxirgi kirish: ${fmtDate(u.lastSeen)} · ro'yxatdan: ${fmtDate(u.firstSeen)}</div>
      </div>
      <div class="acts">${plan}</div>
    </div></div>`;
  }).join("");
}
function renderAdmins(list) {
  const rows = [];
  rows.push(`<div class="row" style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);">
    <div><div class="email">${superEmail}</div><div class="muted">Super admin · egasi</div></div>
    <div class="acts"><span class="badge b-active">SUPER</span></div></div>`);
  list.filter(e => e.toLowerCase() !== superEmail).forEach(e => {
    rows.push(`<div class="row" style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);">
      <div><div class="email">${e}</div><div class="muted">Admin</div></div>
      <div class="acts"><button class="btn red sm" data-del="${encodeURIComponent(e)}">O'chirish</button></div></div>`);
  });
  $("admin-list").innerHTML = rows.join("");
  $("admin-list").querySelectorAll("[data-del]").forEach(b => b.onclick = () => removeAdmin(b.dataset.del));
}
$("add-admin").onclick = async () => {
  const email = $("new-admin").value.trim();
  if (!email.includes("@")) { alert("Email noto'g'ri"); return; }
  const r = await api("/v1/admin/admins", { method: "POST", body: JSON.stringify({ email }) });
  if (r.ok) { $("new-admin").value = ""; loadAdmins(); } else alert("Xato: " + r.status);
};
async function removeAdmin(enc) {
  if (!confirm("Adminni o'chirasizmi?")) return;
  const r = await api(`/v1/admin/admins/${enc}`, { method: "DELETE" });
  if (r.ok) loadAdmins(); else alert("Xato: " + r.status);
}

// --- Analytics ---
const PRICES = (CFG.payment && CFG.payment.prices) || { "1m": "39 000", "2m": "69 000", "1y": "349 000" };
function priceNum(t) { return parseInt(String(PRICES[t] || "0").replace(/\D/g, ""), 10) || 0; }
async function loadStats() {
  $("list").innerHTML = `<div class="empty">Yuklanmoqda…</div>`;
  try {
    const r = await api("/v1/admin/stats");
    if (r.status === 403) { $("list").innerHTML = `<div class="empty">Ruxsat yo'q.</div>`; return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    renderStats(await r.json());
  } catch (e) { $("list").innerHTML = `<div class="empty">Xato: ${e.message}</div>`; }
}
function renderStats(s) {
  const tiers = s.tiers || {};
  let revenue = 0;
  for (const t in tiers) revenue += tiers[t] * priceNum(t);
  const fmt = (n) => n.toLocaleString("ru-RU");
  const tile = (v, l, c) => `<div class="card" style="text-align:center;padding:18px 12px;margin:0;">
    <div style="font-family:'Sora';font-weight:800;font-size:26px;color:${c || '#fff'};">${v}</div>
    <div class="muted" style="margin-top:4px;">${l}</div></div>`;
  const tierName = (t) => t === "1y" ? "1 yil" : (/^(\d+)m$/.exec(t) ? RegExp.$1 + " oy" : t);
  const tierRows = Object.keys(tiers).sort().map(t =>
    `<div class="row" style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);"><div>${tierName(t)}</div><div class="acts"><span class="badge b-active">${tiers[t]} ta</span></div></div>`).join("") || `<div class="muted">Faol tarif yo'q</div>`;
  $("list").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;">
      ${tile(s.users || 0, "Jami foydalanuvchi")}
      ${tile((s.active || 0) + (s.trial || 0), "Premium (faol+sinov)", "#43d684")}
      ${tile(s.trial || 0, "Sinovda", "#a3a3ff")}
      ${tile(s.pending || 0, "To'lov kutilmoqda", "#FFB454")}
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div class="muted" style="margin-bottom:4px;">Oylik takrorlanuvchi daromad (faol obunalar)</div>
      <div style="font-family:'Sora';font-weight:800;font-size:30px;color:#fff;">${fmt(revenue)} <span style="font-size:15px;color:#8a8c92;">so'm</span></div>
    </div>
    <div class="card"><h2 style="margin-bottom:10px;">Tariflar bo'yicha</h2>${tierRows}</div>`;
}

// --- White-label branding panel ---
async function loadBranding() {
  $("list").innerHTML = `<div class="empty">Yuklanmoqda…</div>`;
  let b = {};
  try { const r = await api("/v1/branding"); if (r.ok) b = await r.json(); } catch (e) {}
  const v = (k, d) => (b[k] || d || "");
  $("list").innerHTML = `
    <div class="card">
      <h2>🎨 Ilova brendi (White-label)</h2>
      <p class="muted" style="margin-bottom:14px;">O'zgartirishlar barcha foydalanuvchilarга darhol qo'llanadi — config tahrirlash shart emas.</p>
      <label class="muted">Nom</label>
      <input id="b-name" placeholder="VoltDrive" value="${v('name')}" style="margin:6px 0 14px;">
      <label class="muted">Tagline</label>
      <input id="b-tag" placeholder="Smart EV Control" value="${v('tagline')}" style="margin:6px 0 14px;">
      <label class="muted">Logo URL (ixtiyoriy)</label>
      <input id="b-logo" placeholder="https://.../logo.png" value="${v('logo')}" style="margin:6px 0 16px;">
      <div class="row" style="gap:18px;">
        <div><div class="muted" style="margin-bottom:6px;">Asosiy (och)</div><input type="color" id="b-acc" value="${v('accent','#FF8A2B')}" style="width:56px;height:40px;padding:2px;"></div>
        <div><div class="muted" style="margin-bottom:6px;">Asosiy (to'q)</div><input type="color" id="b-acc2" value="${v('accent2','#FF4D00')}" style="width:56px;height:40px;padding:2px;"></div>
        <div><div class="muted" style="margin-bottom:6px;">Matn/ikona</div><input type="color" id="b-accs" value="${v('accentSolid','#FF8A3D')}" style="width:56px;height:40px;padding:2px;"></div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,.08);margin:18px 0 14px;padding-top:14px;">
        <h2 style="font-size:15px;">💳 To'lov kartasi (qo'lda to'lov)</h2>
        <p class="muted" style="margin-bottom:12px;">Mijoz shu kartaga o'tkazadi. Premium ekranida shu raqam ko'rinadi.</p>
        <label class="muted">Karta raqami</label>
        <input id="b-card" placeholder="8600 1234 5678 9012" value="${v('payCard')}" style="margin:6px 0 14px;letter-spacing:1px;">
        <label class="muted">Karta egasi</label>
        <input id="b-holder" placeholder="VoltDrive LLC / Ism Familiya" value="${v('payHolder')}" style="margin:6px 0 2px;">
      </div>
      <div class="row" style="margin-top:18px;gap:10px;">
        <button class="btn" id="b-save">Saqlash</button>
        <button class="btn ghost" id="b-reset">Standartga qaytarish</button>
      </div>
      <div id="b-msg" class="muted" style="margin-top:10px;"></div>
    </div>`;
  $("b-save").onclick = () => saveBranding();
  $("b-reset").onclick = () => saveBranding(true);
}
async function saveBranding(reset) {
  const body = reset ? { name: "", tagline: "", logo: "", accent: "", accent2: "", accentSolid: "", payCard: "", payHolder: "" } : {
    name: $("b-name").value.trim(), tagline: $("b-tag").value.trim(), logo: $("b-logo").value.trim(),
    accent: $("b-acc").value, accent2: $("b-acc2").value, accentSolid: $("b-accs").value,
    payCard: $("b-card").value.trim(), payHolder: $("b-holder").value.trim(),
  };
  const r = await api("/v1/admin/branding", { method: "PUT", body: JSON.stringify(body) });
  $("b-msg").textContent = r.ok ? "Saqlandi ✓ (ilovani yangilang)" : "Xato: " + r.status;
  $("b-msg").style.color = r.ok ? "#43d684" : "#ff8a8a";
}

async function activate(uid) {
  const tier = $("t-" + uid).value;
  const r = await api(`/v1/admin/subscriptions/${uid}/activate`, { method: "POST", body: JSON.stringify({ tier }) });
  if (r.ok) load(); else alert("Xato: " + r.status);
}
async function revoke(uid) {
  if (!confirm("Obunani bekor qilasizmi?")) return;
  const r = await api(`/v1/admin/subscriptions/${uid}/revoke`, { method: "POST" });
  if (r.ok) load(); else alert("Xato: " + r.status);
}
</script>
</body>
</html>
